name: cseclubhub
description: "CSE Club Hub — The official platform for CSE department club members."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1

  # Routing
  go_router: ^14.6.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Supabase
  supabase_flutter: ^2.8.4

  # Image / File
  image_picker: ^1.2.2
  file_picker: ^8.1.6

  # Utils
  intl: ^0.20.2
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.3
  uuid: ^4.5.1
  collection: ^1.19.1

  # Storage
  shared_preferences: ^2.3.4

  # Rich text
  flutter_quill: ^11.5.1

  # Charts (for admin dashboard)
  fl_chart: ^0.69.0
  cloud_firestore: 

  # Notifications
  firebase_messaging: 
  flutter_local_notifications: ^17.0.0

  # Auth
  firebase_core: 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
